<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Analytics Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar py-3 mb-4 text-white">
    <div class="container">
        <h4 class="mb-0"><i class="fab fa-instagram me-2"></i> Instagram Analytics</h4>
    </div>
</nav>

<div class="container">
    <div class="card p-4 mb-4">
        <form method="POST" class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-bold">Usuario de Instagram</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" name="username" class="form-control" placeholder="porsche" required>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Cantidad de Posts</label>
                <input type="number" name="cantidad" class="form-control" value="5" min="1" max="20">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100 py-2"><i class="fas fa-search me-1"></i> Analizar</button>
            </div>
            <div class="col-md-2">
                <a href="/" class="btn btn-outline-secondary w-100 py-2">Limpiar</a>
            </div>
        </form>
    </div>

    {% if posts %}
        {% include '_results.html' %}
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
